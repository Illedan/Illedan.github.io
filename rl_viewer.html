<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const errEl = document.getElementById('err');
function showError(m) { errEl.textContent = m; }

function loadTextureFromURL(url) {
  return new Promise((res, rej) => {
    new THREE.TextureLoader().load(url, t => {
      t.colorSpace = THREE.SRGBColorSpace;
      t.minFilter = THREE.LinearMipmapLinearFilter;
      t.magFilter = THREE.LinearFilter;
      t.anisotropy = 8;
      res(t);
    }, undefined, rej);
  });
}

async function main() {
  const data = window.LAP_DATA;
  if (!data) { showError('LAP_DATA missing'); return; }
  const meta = data.meta;
  const path = data.path;
  const wallPolys = window.WALL_POLYLINES || [];

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c1018);
  scene.fog = new THREE.Fog(0x0c1018, 35, 260);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

  const WIM = meta.image_width_px;
  const HIM = meta.image_height_px;
  const M_PER_PX = meta.m_per_px;
  const W_M = WIM * M_PER_PX;
  const H_M = HIM * M_PER_PX;
  const px2x = (x_px) => (x_px - WIM / 2) * M_PER_PX;
  const px2z = (y_px) => (y_px - HIM / 2) * M_PER_PX;

  const trackTex = await loadTextureFromURL(window.TRACK_IMG_DATA_URL);
  const groundMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(W_M, H_M),
    new THREE.MeshBasicMaterial({ map: trackTex })
  );
  groundMesh.rotation.x = -Math.PI / 2;
  scene.add(groundMesh);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 0.85);
  sun.position.set(40, 80, 30);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.25);
  fill.position.set(-30, 40, -20);
  scene.add(fill);

  // 3D walls
  const WALL_H = 1.2;
  const positions = []; const indices = []; let v = 0;
  for (const poly of wallPolys) {
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i]; const b = poly[(i + 1) % poly.length];
      const ax = px2x(a[0]), az = px2z(a[1]);
      const bx = px2x(b[0]), bz = px2z(b[1]);
      if (Math.hypot(bx - ax, bz - az) < 1e-3) continue;
      positions.push(ax, 0, az);
      positions.push(bx, 0, bz);
      positions.push(bx, WALL_H, bz);
      positions.push(ax, WALL_H, az);
      indices.push(v, v + 1, v + 2);
      indices.push(v, v + 2, v + 3);
      v += 4;
    }
  }
  if (positions.length) {
    const wallGeo = new THREE.BufferGeometry();
    wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    wallGeo.setIndex(indices);
    wallGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(wallGeo,
      new THREE.MeshStandardMaterial({ color: 0xd92828, roughness: 0.7, metalness: 0.05, side: THREE.DoubleSide })));
  }
  const capMat = new THREE.LineBasicMaterial({ color: 0xff5050 });
  for (const poly of wallPolys) {
    const pts = poly.map(p => new THREE.Vector3(px2x(p[0]), WALL_H + 0.01, px2z(p[1])));
    pts.push(pts[0]);
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), capMat));
  }

  // Path tube
  const linePts = path.map(p => new THREE.Vector3(px2x(p.x_px), 0.05, px2z(p.y_px)));
  if (data.closed) linePts.push(linePts[0]);
  const curve = new THREE.CatmullRomCurve3(linePts, !!data.closed, 'catmullrom', 0.0);
  const tubeGeo = new THREE.TubeGeometry(curve, path.length * 2, 0.18, 8, !!data.closed);
  scene.add(new THREE.Mesh(tubeGeo,
    new THREE.MeshBasicMaterial({ color: 0x3878ff, transparent: true, opacity: 0.9 })));

  // Start marker
  const startMesh = new THREE.Mesh(new THREE.CircleGeometry(0.7, 24),
    new THREE.MeshBasicMaterial({ color: 0xffd400 }));
  startMesh.rotation.x = -Math.PI / 2;
  startMesh.position.set(px2x(path[0].x_px), 0.06, px2z(path[0].y_px));
  scene.add(startMesh);

  // Kart
  const kart = new THREE.Group();
  const chassis = new THREE.Mesh(
    new THREE.BoxGeometry(meta.cart_width_m, 0.25, meta.cart_length_m),
    new THREE.MeshStandardMaterial({ color: 0xff3b3b, metalness: 0.25, roughness: 0.45 })
  );
  chassis.position.y = 0.18; kart.add(chassis);
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(meta.cart_width_m * 0.6, 0.4, meta.cart_length_m * 0.45),
    new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.1, roughness: 0.6 })
  );
  cabin.position.set(0, 0.42, -meta.cart_length_m * 0.05); kart.add(cabin);
  const nose = new THREE.Mesh(
    new THREE.ConeGeometry(meta.cart_width_m * 0.3, 0.4, 4),
    new THREE.MeshStandardMaterial({ color: 0xffaa22 })
  );
  nose.rotation.x = Math.PI / 2;
  nose.position.set(0, 0.25, meta.cart_length_m * 0.55); kart.add(nose);
  scene.add(kart);

  // Build cumulative time array. Uses each path point's t_s if provided
  // (RL trajectory has it directly), otherwise derives from speed and dx.
  const N = path.length;
  let cumT;
  if (path[0].t_s !== undefined && path[N - 1].t_s !== undefined) {
    cumT = path.map(p => p.t_s);
    if (data.closed) cumT.push(cumT[cumT.length - 1] + (data.tail_dt || 0.05));
  } else {
    const segT = new Array(N);
    for (let i = 0; i < N; i++) {
      const a = path[i]; const b = path[(i + 1) % N];
      const ds = Math.hypot(b.x_m - a.x_m, b.y_m - a.y_m);
      const sp = Math.max(0.5, 0.5 * (a.speed_ms + b.speed_ms));
      segT[i] = ds / sp;
    }
    cumT = [0];
    for (let i = 0; i < segT.length; i++) cumT.push(cumT[cumT.length - 1] + segT[i]);
  }
  const lapTime = cumT[cumT.length - 1];
  const closed = !!data.closed;

  function sampleAt(t) {
    if (closed) {
      t = ((t % lapTime) + lapTime) % lapTime;
    } else {
      // pause at end after lap completes
      if (t >= lapTime) t = lapTime;
    }
    let lo = 0, hi = cumT.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (cumT[mid] <= t) lo = mid; else hi = mid;
    }
    const span = cumT[hi] - cumT[lo];
    const f = span > 1e-9 ? (t - cumT[lo]) / span : 0;
    const a = path[lo % path.length]; const b = path[(lo + 1) % path.length];
    return {
      x_px: a.x_px + f * (b.x_px - a.x_px),
      y_px: a.y_px + f * (b.y_px - a.y_px),
      speed: a.speed_ms + f * (b.speed_ms - a.speed_ms),
      accel: (a.accel_ms2 ?? 0) + f * ((b.accel_ms2 ?? 0) - (a.accel_ms2 ?? 0)),
      heading: (a.heading_rad !== undefined && b.heading_rad !== undefined)
                ? (a.heading_rad + f * (b.heading_rad - a.heading_rad))
                : null,
      dist: (lo / path.length) * meta.track_length_m + f * meta.track_length_m / path.length,
    };
  }
  function headingAt(t, lookahead = 0.15) {
    const a = sampleAt(t);
    if (a.heading !== null) return a.heading;
    const b = sampleAt(t + lookahead);
    return Math.atan2(b.x_px - a.x_px, b.y_px - a.y_px);
  }

  const hSpeed = document.getElementById('hud-speed');
  const hThr   = document.getElementById('hud-throttle');
  const hBrk   = document.getElementById('hud-brake');
  const hTime  = document.getElementById('hud-time');
  const hLap   = document.getElementById('hud-laptime');
  const hDist  = document.getElementById('hud-dist');
  const barS = document.getElementById('bar-speed');
  const barT = document.getElementById('bar-thr');
  const barB = document.getElementById('bar-brk');
  hLap.textContent = lapTime.toFixed(2);

  const clock = new THREE.Clock();
  let elapsed = 0;
  const camPos = new THREE.Vector3();
  const camTarget = new THREE.Vector3();

  function animate() {
    const dt = Math.min(clock.getDelta(), 0.1);
    elapsed += dt;
    const t = closed ? (elapsed % lapTime) : Math.min(elapsed, lapTime);
    const s = sampleAt(t);
    const h = headingAt(t);
    const wx = px2x(s.x_px); const wz = px2z(s.y_px);
    kart.position.set(wx, 0, wz);
    kart.rotation.y = h;

    const speedFrac = Math.min(1, s.speed / meta.top_speed_ms);
    const back = 4.0 + speedFrac * 2.0;
    const up   = 1.8 + speedFrac * 0.6;
    const desiredX = wx - Math.sin(h) * back;
    const desiredZ = wz - Math.cos(h) * back;
    camPos.lerp(new THREE.Vector3(desiredX, up, desiredZ), 1 - Math.exp(-dt * 5));
    camTarget.lerp(new THREE.Vector3(wx + Math.sin(h) * 2.0, 0.6, wz + Math.cos(h) * 2.0), 1 - Math.exp(-dt * 7));
    camera.position.copy(camPos);
    camera.lookAt(camTarget);

    hSpeed.textContent = s.speed.toFixed(1) + ' m/s  (' + (s.speed * 3.6).toFixed(1) + ' km/h)';
    let thrV = 0, brkV = 0;
    if (s.accel >  0.3) thrV = Math.min(s.accel, meta.max_accel_ms2);
    else if (s.accel < -0.3) brkV = -s.accel;
    hThr.textContent = thrV ? (thrV.toFixed(2) + ' m/s²') : '~ coast';
    hBrk.textContent = brkV ? (brkV.toFixed(2) + ' m/s²') : '~ coast';
    hTime.textContent = t.toFixed(2);
    hDist.textContent = s.dist.toFixed(1);
    barS.style.width = (speedFrac * 100).toFixed(0) + '%';
    barT.style.width = ((thrV / meta.max_accel_ms2) * 100).toFixed(0) + '%';
    barB.style.width = ((brkV / meta.emergency_brake_ms2) * 100).toFixed(0) + '%';

    if (closed || elapsed < lapTime + 1.0) {
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    } else {
      // restart for non-closed paths after a brief pause
      elapsed = 0;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

main().catch(e => { console.error(e); showError(String(e)); });
</script>
</body>
</html>
