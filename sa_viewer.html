<script type="module">
import * as THREE from 'three';

const errEl = document.getElementById('err');
function showError(m) { errEl.textContent = m; }

function loadTextureFromURL(url) {
  return new Promise((res, rej) => {
    new THREE.TextureLoader().load(url, t => {
      t.colorSpace = THREE.SRGBColorSpace;
      t.minFilter = THREE.LinearMipmapLinearFilter;
      t.magFilter = THREE.LinearFilter;
      t.anisotropy = 8;
      res(t);
    }, undefined, rej);
  });
}

// ---- decode bit-packed wall bitmap (little-endian bit order) ------------
function decodeBase64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
const WALLS_BYTES = decodeBase64ToBytes(window.WALLS_B64);
const W_IMG = window.WALLS_W;
const H_IMG = window.WALLS_H;
function isWall(x, y) {
  if (x < 0 || y < 0 || x >= W_IMG || y >= H_IMG) return true;
  const ix = x | 0; const iy = y | 0;
  const idx = iy * W_IMG + ix;
  return (WALLS_BYTES[idx >>> 3] & (1 << (idx & 7))) !== 0;
}

// ---- physics constants --------------------------------------------------
const meta = window.META;
const PX_PER_M = meta.px_per_m;
const MAX_SPEED = meta.top_speed_ms;            // 13.9 m/s
const MAX_ACCEL = meta.max_accel_ms2;           // 4.0
const E_BRAKE   = meta.emergency_brake_ms2;     // 8.0
const MU        = meta.mu_friction;
const G         = meta.g_ms2;
const MAX_LAT   = meta.max_lat_accel_ms2;
const CART_W_PX = meta.cart_width_m * PX_PER_M;
const CART_L_PX = meta.cart_length_m * PX_PER_M;
const HALF_L = CART_L_PX / 2;
const HALF_W = CART_W_PX / 2;

// 8 footprint sample points for body collision (corners + edge midpoints)
const FOOT = [
  [ HALF_L,  HALF_W], [ HALF_L, -HALF_W],
  [-HALF_L,  HALF_W], [-HALF_L, -HALF_W],
  [ HALF_L, 0], [-HALF_L, 0],
  [0,  HALF_W], [0, -HALF_W],
];
function bodyHitsWall(x, y, ang) {
  const sin_h = Math.sin(ang), cos_h = Math.cos(ang);
  for (let i = 0; i < FOOT.length; i++) {
    const dl = FOOT[i][0], dw = FOOT[i][1];
    const px = x + sin_h * dl - cos_h * dw;
    const py = y + cos_h * dl + sin_h * dw;
    if (isWall(px, py)) return true;
  }
  return false;
}

// ---- SA action set ------------------------------------------------------
// dAngle per 0.1 s step; grip-limited max ≈ DT*μg/v:
//   v=7 m/s → 8°/step,  v=13.9 m/s → 4°/step
const DT = 0.1;
const A_LG = 8  * Math.PI / 180;  // hard steer (slow corners)
const A_SM = 3.5 * Math.PI / 180; // gentle curve (high speed)
const ACTIONS = [
  { dA: -A_LG, ac:  0,         kind: "L cst" },
  { dA: -A_LG, ac:  MAX_ACCEL, kind: "L acc" },
  { dA: -A_SM, ac:  MAX_ACCEL, kind: "l acc" },
  { dA:  0,    ac:  MAX_ACCEL, kind: "  acc" },
  { dA:  0,    ac: -E_BRAKE,   kind: " brk" },
  { dA:  A_SM, ac:  MAX_ACCEL, kind: "r acc" },
  { dA:  A_LG, ac:  MAX_ACCEL, kind: "R acc" },
  { dA:  A_LG, ac:  0,         kind: "R cst" },
];
const N_ACT = ACTIONS.length;
const DEPTH = 6;
const CP_RADIUS_PX = 30.00;
const CP_RADIUS_SQ = CP_RADIUS_PX * CP_RADIUS_PX;
const FRICTION_PER_STEP = 0.99;   // light drag for SA stability

const CP = window.CHECKPOINTS;
const N_CP = CP.length;

// ---- physics simulation step (mutates `s`) ------------------------------
// state: {x, y, vx, vy, ang, cpIdx, round}
function simStep(s, actIdx) {
  const a = ACTIONS[actIdx];
  s.ang += a.dA;
  const sin_a = Math.sin(s.ang), cos_a = Math.cos(s.ang);
  s.vx += sin_a * a.ac * DT;
  s.vy += cos_a * a.ac * DT;
  // no reverse: clamp out the backward velocity component
  const fwdSpd = s.vx * sin_a + s.vy * cos_a;
  if (fwdSpd < 0) { s.vx -= sin_a * fwdSpd; s.vy -= cos_a * fwdSpd; }
  // drag and top-speed cap
  s.vx *= FRICTION_PER_STEP;
  s.vy *= FRICTION_PER_STEP;
  const sp = Math.hypot(s.vx, s.vy);
  if (sp > MAX_SPEED) { s.vx = s.vx / sp * MAX_SPEED; s.vy = s.vy / sp * MAX_SPEED; }
  // move
  s.x += s.vx * PX_PER_M * DT;
  s.y += s.vy * PX_PER_M * DT;
  // checkpoint cross check (closest of next 3 to allow skipping bad cps)
  let crossed = 0;
  for (let look = 0; look < 3; look++) {
    const idx = (s.cpIdx + look) % N_CP;
    const c = CP[idx];
    const dx = s.x - c.x_px, dy = s.y - c.y_px;
    if (dx*dx + dy*dy < CP_RADIUS_SQ) {
      // jump to past this checkpoint
      s.cpIdx += (look + 1);
      if (s.cpIdx >= N_CP) {
        s.round += Math.floor(s.cpIdx / N_CP);
        s.cpIdx = s.cpIdx % N_CP;
      }
      crossed = look + 1;
      break;
    }
  }
  return crossed;  // 0 = no cross, n = crossed n checkpoints (allows skip)
}

// ---- SA scoring -----------------------------------------------------------
// Each checkpoint crossed = +1000 pts.  Crossing must ALWAYS beat staying
// near the current CP, so distance and alignment bonuses are kept << 1000.
function scoreSeq(state, seq) {
  scratch.x = state.x;  scratch.y = state.y;
  scratch.vx = state.vx; scratch.vy = state.vy;
  scratch.ang = state.ang;
  scratch.cpIdx = state.cpIdx; scratch.round = state.round;
  let crashedAt = -1;
  for (let i = 0; i < DEPTH; i++) {
    simStep(scratch, seq[i]);
    if (bodyHitsWall(scratch.x, scratch.y, scratch.ang)) {
      crashedAt = i; break;
    }
  }
  // base: total checkpoints ever crossed × 1000
  let s = (scratch.round * N_CP + scratch.cpIdx) * 1000;
  // linear distance to NEXT checkpoint — max penalty << 1000
  const next = CP[scratch.cpIdx % N_CP];
  const dx = scratch.x - next.x_px, dy = scratch.y - next.y_px;
  s -= Math.hypot(dx, dy) * 0.3;
  // small heading-alignment bonus (tiebreaker only)
  const fwdx = Math.sin(scratch.ang), fwdy = Math.cos(scratch.ang);
  s += 5.0 * (fwdx * next.tx + fwdy * next.ty);
  // crash penalty — must dominate several crossed checkpoints
  if (crashedAt >= 0) {
    s -= 20000 * (1.0 - crashedAt / DEPTH);
  }
  return s;
}

const scratch = { x:0, y:0, vx:0, vy:0, ang:0, cpIdx:0, round:0 };

// ---- SA think -----------------------------------------------------------
let lastBest = new Array(DEPTH).fill(3);  // start with "straight + accel"

function thinkSA(state, ms) {
  const t0 = performance.now();
  // Roll the previous best forward by one step (the action we just applied)
  const seed = lastBest.slice(1);
  seed.push(3);
  let best = seed.slice();
  let bestScore = scoreSeq(state, best);
  const cand = best.slice();
  let evals = 1;
  // also try the always-go-straight baseline
  const baseline = new Array(DEPTH).fill(3);
  const baselineScore = scoreSeq(state, baseline);
  if (baselineScore > bestScore) { best = baseline.slice(); bestScore = baselineScore; }
  evals++;

  let temperature = 50000.0;
  while (performance.now() - t0 < ms) {
    for (let i = 0; i < DEPTH; i++) cand[i] = best[i];
    const r = Math.random();
    if (r < 0.25) {
      for (let i = 0; i < DEPTH; i++) cand[i] = (Math.random() * N_ACT) | 0;
    } else if (r < 0.65) {
      const n = 1 + ((Math.random() * 4) | 0);
      for (let k = 0; k < n; k++) {
        const idx = (Math.random() * DEPTH) | 0;
        let d = ((Math.random() * 5) | 0) - 2;
        if (d === 0) d = 1;
        cand[idx] = Math.max(0, Math.min(N_ACT - 1, cand[idx] + d));
      }
    } else {
      const n = 1 + ((Math.random() * 4) | 0);
      for (let k = 0; k < n; k++) {
        const idx = (Math.random() * DEPTH) | 0;
        cand[idx] = (Math.random() * N_ACT) | 0;
      }
    }
    const sc = scoreSeq(state, cand);
    evals++;
    if (sc > bestScore) {
      for (let i = 0; i < DEPTH; i++) best[i] = cand[i];
      bestScore = sc;
    } else if (sc + temperature > bestScore && Math.random() < 0.1) {
      // gentle annealing acceptance
      for (let i = 0; i < DEPTH; i++) best[i] = cand[i];
      bestScore = sc;
    }
    temperature *= 0.995;
  }
  lastBest = best;
  return { actionIdx: best[0], evals, score: bestScore };
}

// =========================================================================
// 3D scene
// =========================================================================
async function main() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c1018);
  scene.fog = new THREE.Fog(0x0c1018, 35, 260);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

  const M_PER_PX = meta.m_per_px;
  const W_M = W_IMG * M_PER_PX;
  const H_M = H_IMG * M_PER_PX;
  const px2x = (x_px) => (x_px - W_IMG / 2) * M_PER_PX;
  const px2z = (y_px) => (y_px - H_IMG / 2) * M_PER_PX;

  // Ground texture
  const trackTex = await loadTextureFromURL(window.TRACK_IMG_DATA_URL);
  const groundMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(W_M, H_M),
    new THREE.MeshBasicMaterial({ map: trackTex })
  );
  groundMesh.rotation.x = -Math.PI / 2;
  scene.add(groundMesh);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 0.85); sun.position.set(40, 80, 30); scene.add(sun);

  // 3D walls
  const wallPolys = window.WALL_POLYLINES || [];
  const WALL_H = 1.2;
  const positions = []; const indices = []; let v = 0;
  for (const poly of wallPolys) {
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i]; const b = poly[(i + 1) % poly.length];
      const ax = px2x(a[0]), az = px2z(a[1]);
      const bx = px2x(b[0]), bz = px2z(b[1]);
      if (Math.hypot(bx - ax, bz - az) < 1e-3) continue;
      positions.push(ax, 0, az, bx, 0, bz, bx, WALL_H, bz, ax, WALL_H, az);
      indices.push(v, v + 1, v + 2, v, v + 2, v + 3);
      v += 4;
    }
  }
  if (positions.length) {
    const wg = new THREE.BufferGeometry();
    wg.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    wg.setIndex(indices); wg.computeVertexNormals();
    scene.add(new THREE.Mesh(wg, new THREE.MeshStandardMaterial({ color: 0xd92828, roughness: 0.7, side: THREE.DoubleSide })));
  }

  // Faded racing-line tube (the guidance path)
  if (window.REFERENCE_PATH && window.REFERENCE_PATH.length > 1) {
    const refPts = window.REFERENCE_PATH.map(p => new THREE.Vector3(px2x(p[0]), 0.04, px2z(p[1])));
    refPts.push(refPts[0]);
    const refCurve = new THREE.CatmullRomCurve3(refPts, true, 'catmullrom', 0.0);
    const refGeo = new THREE.TubeGeometry(refCurve, refPts.length * 2, 0.10, 6, true);
    scene.add(new THREE.Mesh(refGeo, new THREE.MeshBasicMaterial({ color: 0x3878ff, transparent: true, opacity: 0.35 })));
  }

  // Checkpoints (yellow rings)
  for (const c of CP) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(CP_RADIUS_PX * M_PER_PX * 0.95, CP_RADIUS_PX * M_PER_PX, 24),
      new THREE.MeshBasicMaterial({ color: 0xffd400, transparent: true, opacity: 0.55, side: THREE.DoubleSide }));
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(px2x(c.x_px), 0.07, px2z(c.y_px));
    scene.add(ring);
  }

  // Cart trail (line of recent positions)
  const TRAIL_MAX = 800;
  const trailGeo = new THREE.BufferGeometry();
  const trailPos = new Float32Array(TRAIL_MAX * 3);
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
  trailGeo.setDrawRange(0, 0);
  const trailMat = new THREE.LineBasicMaterial({ color: 0x33dd66, transparent: true, opacity: 0.85 });
  scene.add(new THREE.Line(trailGeo, trailMat));
  let trailLen = 0;

  // ---- detailed go-kart model (wheels + frame + driver) ---------------
  function buildKart(W, L) {
    const grp = new THREE.Group();
    const matRed   = new THREE.MeshStandardMaterial({ color: 0xd62828, metalness: 0.4, roughness: 0.4 });
    const matBlack = new THREE.MeshStandardMaterial({ color: 0x121212, metalness: 0.2, roughness: 0.85 });
    const matRubber= new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.05, roughness: 0.95 });
    const matRim   = new THREE.MeshStandardMaterial({ color: 0xb8b8b8, metalness: 0.85, roughness: 0.25 });
    const matSeat  = new THREE.MeshStandardMaterial({ color: 0x222a2e, metalness: 0.1,  roughness: 0.85 });
    const matSuit  = new THREE.MeshStandardMaterial({ color: 0x2d4ea8, metalness: 0.15, roughness: 0.6 });
    const matSkin  = new THREE.MeshStandardMaterial({ color: 0xd9b48a, metalness: 0.0,  roughness: 0.9 });
    const matHelmet= new THREE.MeshStandardMaterial({ color: 0xfafafa, metalness: 0.4,  roughness: 0.25 });
    const matVisor = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6,  roughness: 0.15 });
    const matAccent= new THREE.MeshStandardMaterial({ color: 0xffaa22, metalness: 0.3,  roughness: 0.4 });

    // -- chassis floor (the kart frame) --
    const floor = new THREE.Mesh(new THREE.BoxGeometry(W * 0.85, 0.05, L * 0.85), matBlack);
    floor.position.y = 0.07; grp.add(floor);
    // -- side rails (red) --
    const railGeo = new THREE.BoxGeometry(0.06, 0.10, L * 0.85);
    const railL = new THREE.Mesh(railGeo, matRed); railL.position.set(-W * 0.45, 0.12, 0); grp.add(railL);
    const railR = new THREE.Mesh(railGeo, matRed); railR.position.set( W * 0.45, 0.12, 0); grp.add(railR);
    // -- front bumper (curved) --
    const front = new THREE.Mesh(new THREE.BoxGeometry(W * 0.95, 0.10, 0.18), matRed);
    front.position.set(0, 0.13, L * 0.45); grp.add(front);
    const noseTip = new THREE.Mesh(new THREE.BoxGeometry(W * 0.55, 0.08, 0.30), matAccent);
    noseTip.position.set(0, 0.12, L * 0.55); grp.add(noseTip);
    // -- rear bumper --
    const rear = new THREE.Mesh(new THREE.BoxGeometry(W * 0.85, 0.10, 0.12), matRed);
    rear.position.set(0, 0.13, -L * 0.45); grp.add(rear);

    // -- 4 wheels --
    const tireR = 0.14, tireH = 0.18;
    const wheelGeom = new THREE.CylinderGeometry(tireR, tireR, tireH, 18);
    const rimGeom   = new THREE.CylinderGeometry(tireR * 0.55, tireR * 0.55, tireH * 1.02, 14);
    function makeWheel(side, axleZ) {
      const w = new THREE.Group();
      const tire = new THREE.Mesh(wheelGeom, matRubber);
      const rim  = new THREE.Mesh(rimGeom, matRim);
      // cylinder default axis is Y; we want axle along X (left/right)
      tire.rotation.z = Math.PI / 2;
      rim.rotation.z  = Math.PI / 2;
      w.add(tire); w.add(rim);
      const x = side * (W * 0.5 + tireH * 0.45);
      w.position.set(x, tireR, axleZ);
      return w;
    }
    grp.add(makeWheel(-1,  L * 0.36));   // front left
    grp.add(makeWheel( 1,  L * 0.36));   // front right
    grp.add(makeWheel(-1, -L * 0.36));   // rear left
    grp.add(makeWheel( 1, -L * 0.36));   // rear right

    // -- seat (back rest behind the driver) --
    const seatBack = new THREE.Mesh(new THREE.BoxGeometry(W * 0.55, 0.55, 0.08), matSeat);
    seatBack.position.set(0, 0.40, -L * 0.18);
    seatBack.rotation.x = -0.15;
    grp.add(seatBack);
    const seatBase = new THREE.Mesh(new THREE.BoxGeometry(W * 0.55, 0.05, 0.30), matSeat);
    seatBase.position.set(0, 0.18, -L * 0.05); grp.add(seatBase);

    // -- steering column + wheel --
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.32, 8), matBlack);
    col.position.set(0, 0.30, L * 0.20);
    col.rotation.x = -Math.PI / 4; grp.add(col);
    const swheel = new THREE.Mesh(new THREE.TorusGeometry(0.10, 0.02, 8, 24), matBlack);
    swheel.position.set(0, 0.41, L * 0.27);
    swheel.rotation.x = Math.PI / 4; grp.add(swheel);

    // -- driver --
    const drv = new THREE.Group();
    drv.position.set(0, 0.0, -L * 0.05);
    // torso (seated, leaning slightly back)
    const torso = new THREE.Mesh(new THREE.BoxGeometry(W * 0.35, 0.40, 0.22), matSuit);
    torso.position.set(0, 0.42, -0.02);
    torso.rotation.x = -0.12; drv.add(torso);
    // hips
    const hips = new THREE.Mesh(new THREE.BoxGeometry(W * 0.36, 0.18, 0.22), matSuit);
    hips.position.set(0, 0.24, 0.04); drv.add(hips);
    // legs (forward, knees up)
    const thighGeo = new THREE.BoxGeometry(0.13, 0.12, 0.32);
    const thighL = new THREE.Mesh(thighGeo, matSuit); thighL.position.set(-0.10, 0.24, 0.22); drv.add(thighL);
    const thighR = new THREE.Mesh(thighGeo, matSuit); thighR.position.set( 0.10, 0.24, 0.22); drv.add(thighR);
    const shinGeo = new THREE.BoxGeometry(0.12, 0.10, 0.30);
    const shinL  = new THREE.Mesh(shinGeo, matSuit); shinL.position.set(-0.10, 0.20, 0.50); drv.add(shinL);
    const shinR  = new THREE.Mesh(shinGeo, matSuit); shinR.position.set( 0.10, 0.20, 0.50); drv.add(shinR);
    // arms — extended toward steering wheel
    const armGeo = new THREE.BoxGeometry(0.08, 0.30, 0.08);
    const armL = new THREE.Mesh(armGeo, matSuit);
    armL.position.set(-0.18, 0.50, 0.22); armL.rotation.x = -1.0; drv.add(armL);
    const armR = new THREE.Mesh(armGeo, matSuit);
    armR.position.set( 0.18, 0.50, 0.22); armR.rotation.x = -1.0; drv.add(armR);
    // gloves
    const gloveGeo = new THREE.SphereGeometry(0.05, 12, 8);
    const gloveL = new THREE.Mesh(gloveGeo, matBlack); gloveL.position.set(-0.08, 0.41, 0.34); drv.add(gloveL);
    const gloveR = new THREE.Mesh(gloveGeo, matBlack); gloveR.position.set( 0.08, 0.41, 0.34); drv.add(gloveR);
    // neck
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.05, 12), matSkin);
    neck.position.set(0, 0.66, 0.0); drv.add(neck);
    // helmet (sphere) + visor
    const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.13, 18, 14), matHelmet);
    helmet.position.set(0, 0.78, 0.02); drv.add(helmet);
    const visor = new THREE.Mesh(
      new THREE.SphereGeometry(0.131, 18, 14, 0, Math.PI * 2, Math.PI * 0.32, Math.PI * 0.22),
      matVisor);
    visor.position.copy(helmet.position);
    visor.rotation.y = Math.PI;
    drv.add(visor);
    // helmet stripe (red accent)
    const stripe = new THREE.Mesh(
      new THREE.SphereGeometry(0.132, 18, 14, 0, Math.PI * 2, 0, Math.PI * 0.10),
      matRed);
    stripe.position.copy(helmet.position);
    drv.add(stripe);

    grp.add(drv);
    return grp;
  }

  const kart = buildKart(meta.cart_width_m, meta.cart_length_m);
  scene.add(kart);
  // tag the four wheels so we can spin them with speed
  const kartWheels = kart.children.filter(c => c.children.length === 2 && c.children[0].geometry?.type === "CylinderGeometry");

  // ----- driver state -----
  // The agent state lives in pixel coords for fast wall lookup. Velocity in m/s.
  const state = {
    x: meta.start_x_px,
    y: meta.start_y_px,
    vx: 0, vy: 0,
    ang: Math.atan2(CP[0].tx, CP[0].ty),  // initial heading toward first checkpoint
    cpIdx: 0,
    round: 0,
  };

  // history for smooth Catmull-Rom interpolation between sim steps
  const hist = [];
  function pushHist() {
    hist.push({ x: state.x, y: state.y, ang: state.ang, vx: state.vx, vy: state.vy });
    if (hist.length > 6) hist.shift();
  }
  pushHist(); pushHist();

  let lastSimT = 0; // seconds (game clock)
  const startWall = performance.now();
  let lastEvals = 0;
  let lastAccel = 0;
  let scoreDisplay = 0;

  // Apply one 0.1 s action; if it crashes, reset to start
  function tickAction(action) {
    const before = { x: state.x, y: state.y, vx: state.vx, vy: state.vy, ang: state.ang };
    simStep(state, action);
    if (bodyHitsWall(state.x, state.y, state.ang)) {
      // revert to pre-step position+angle; kill most velocity
      state.x = before.x; state.y = before.y;
      state.ang = before.ang;
      state.vx = 0; state.vy = 0;
    }
    // accel for HUD
    const newSp = Math.hypot(state.vx, state.vy);
    const oldSp = Math.hypot(before.vx, before.vy);
    lastAccel = (newSp - oldSp) / DT;
    pushHist();
  }

  // Catmull-Rom interpolation across hist for buttery animation
  function catmull(p0, p1, p2, p3, f) {
    const f2 = f * f, f3 = f2 * f;
    return 0.5 * ((2*p1) + (-p0 + p2)*f + (2*p0 - 5*p1 + 4*p2 - p3)*f2 + (-p0 + 3*p1 - 3*p2 + p3)*f3);
  }
  function unwrapAngle(ref, h) {
    let d = h - ref;
    while (d >  Math.PI) d -= 2*Math.PI;
    while (d < -Math.PI) d += 2*Math.PI;
    return ref + d;
  }
  function sampleHist(localF) {
    // localF in [0, 1] across the most recent hist segment
    // use 4 most-recent snapshots
    const N = hist.length;
    const p0 = hist[Math.max(0, N-4)], p1 = hist[Math.max(0, N-3)], p2 = hist[Math.max(0, N-2)], p3 = hist[N-1];
    const x = catmull(p0.x, p1.x, p2.x, p3.x, localF);
    const y = catmull(p0.y, p1.y, p2.y, p3.y, localF);
    const a1 = p1.ang;
    const a0 = unwrapAngle(a1, p0.ang);
    const a2 = unwrapAngle(a1, p2.ang);
    const a3 = unwrapAngle(a2, p3.ang);
    const ang = catmull(a0, a1, a2, a3, localF);
    return { x, y, ang };
  }

  // HUD elements
  const hSpeed = document.getElementById('hud-speed');
  const hThr   = document.getElementById('hud-throttle');
  const hBrk   = document.getElementById('hud-brake');
  const hRound = document.getElementById('hud-round');
  const hCp    = document.getElementById('hud-cp');
  const hScore = document.getElementById('hud-score');
  const hEvals = document.getElementById('hud-evals');
  const barS = document.getElementById('bar-speed');
  const barT = document.getElementById('bar-thr');
  const barB = document.getElementById('bar-brk');

  // Animation
  const camPos = new THREE.Vector3();
  const camTarget = new THREE.Vector3();
  let displayAng = 0;

  function animate() {
    const now = (performance.now() - startWall) / 1000.0;

    // clamp game-clock if we fall more than 2 steps behind real time
    // (prevents a catch-up burst after scene load or tab switch)
    if (now - lastSimT > 2 * DT) lastSimT = now - DT;

    // one SA step per render frame
    if (now - lastSimT >= DT) {
      const r = thinkSA(state, 8);
      tickAction(r.actionIdx);
      lastSimT += DT;
      lastEvals = r.evals;
      scoreDisplay = state.round * 5000 + state.cpIdx;
      // append to trail
      const wx = px2x(state.x); const wz = px2z(state.y);
      const i3 = trailLen * 3;
      if (trailLen < TRAIL_MAX) {
        trailPos[i3] = wx; trailPos[i3+1] = 0.06; trailPos[i3+2] = wz;
        trailLen++;
      } else {
        // shift left
        trailPos.copyWithin(0, 3);
        trailPos[(TRAIL_MAX-1)*3]   = wx;
        trailPos[(TRAIL_MAX-1)*3+1] = 0.06;
        trailPos[(TRAIL_MAX-1)*3+2] = wz;
      }
      trailGeo.setDrawRange(0, trailLen);
      trailGeo.attributes.position.needsUpdate = true;
    }
    // Smooth interpolated pose for display (Catmull-Rom across history)
    const localF = Math.max(0, Math.min(1, (now - (lastSimT - DT)) / DT));
    const sm = sampleHist(localF);
    const wx = px2x(sm.x); const wz = px2z(sm.y);
    kart.position.set(wx, 0, wz);
    kart.rotation.y = sm.ang;

    const sp = Math.hypot(state.vx, state.vy);
    // spin wheels proportional to distance covered this frame
    if (kartWheels.length && typeof lastFrame !== 'undefined') {
      const fdt = Math.min(0.05, now - lastFrame);
      const spinDelta = (sp * fdt) / 0.14;
      for (const wg of kartWheels) wg.rotation.x += spinDelta;
    }
    const speedFrac = Math.min(1, sp / MAX_SPEED);
    const back = 4.0 + speedFrac * 2.0;
    const up   = 1.8 + speedFrac * 0.6;
    const dt = Math.min(0.1, now - (lastFrame || now));
    const desiredX = wx - Math.sin(sm.ang) * back;
    const desiredZ = wz - Math.cos(sm.ang) * back;
    camPos.lerp(new THREE.Vector3(desiredX, up, desiredZ), 1 - Math.exp(-dt * 5));
    camTarget.lerp(new THREE.Vector3(wx + Math.sin(sm.ang) * 2.0, 0.6, wz + Math.cos(sm.ang) * 2.0), 1 - Math.exp(-dt * 7));
    camera.position.copy(camPos); camera.lookAt(camTarget);

    // HUD
    hSpeed.textContent = sp.toFixed(1) + ' m/s  (' + (sp * 3.6).toFixed(1) + ' km/h)';
    let thrV = 0, brkV = 0;
    if (lastAccel >  0.3) thrV = Math.min(lastAccel, MAX_ACCEL);
    else if (lastAccel < -0.3) brkV = -lastAccel;
    hThr.textContent = thrV ? (thrV.toFixed(2) + ' m/s²') : '~ coast';
    hBrk.textContent = brkV ? (brkV.toFixed(2) + ' m/s²') : '~ coast';
    hRound.textContent = state.round;
    hCp.textContent = state.cpIdx;
    hScore.textContent = scoreDisplay;
    hEvals.textContent = lastEvals;
    barS.style.width = (speedFrac * 100).toFixed(0) + '%';
    barT.style.width = ((thrV / MAX_ACCEL) * 100).toFixed(0) + '%';
    barB.style.width = ((brkV / E_BRAKE) * 100).toFixed(0) + '%';

    lastFrame = now;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  let lastFrame = 0;
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

main().catch(e => { console.error(e); showError(String(e)); });
</script>
</body>
</html>
